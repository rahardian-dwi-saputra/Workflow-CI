name: Machine Learning CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

env:
  CSV_URL: "MLproject/heart_preprocessing/heart_preprocessing.csv"
  TARGET_VAR: "Heart Failure Prediction"
  MLFLOW_ALLOW_FILE_STORE: "true"
  MLFLOW_TRACKING_URI: "./mlruns"

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Setup Python 3.12.7
    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: "3.12.7"
    
    # Check Env Variables
    - name: Check Env
      run: |
        echo $CSV_URL

    # Install mlflow
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow

    # Run as a mlflow project
    - name: Run mlflow project
      run: |
        mlflow run ./MLproject --env-manager=local

    # Save models to GitHub Repository
    - name: Get latest MLflow run_id
      run: |
        git config --global user.name ${{ secrets.USERNAME }}
        git config --global user.email ${{ secrets.EMAIL }}
        git add mlruns/
        git commit -m "Save mlruns from CI run"
        git push origin main

    # Mendapatkan Run ID
    - name: Get Run ID
      run: |
        PATH_TERDALAM=$(ls -td mlruns/0/models/m-*/ | head -n 1)
        FOLDER_NAME=$(basename "$PATH_TERDALAM")
        RUN_ID=${FOLDER_NAME#m-}
        
        if [ -z "$RUN_ID" ]; then
          echo "ERROR: Run ID tidak ditemukan!"
          exit 1
        fi

        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "Latest run_id: $RUN_ID"

    - name: Build Docker Model
      run: |
        mlflow models build-docker --model-uri "runs:/${{ env.RUN_ID }}/model" --name "cc" --env-manager=local

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    
    - name: Tag Docker Image
      run: |
        docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest